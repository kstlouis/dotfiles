# prefix + I (capital i, dummy) to reload / install new plugins

# -- KEY BINDINGS ----------------------------------------------------

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# v and h are not bound by default, but we never know in the next versions...
unbind v
unbind h
unbind % # Split vertically
unbind '"' # Split horizontally
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on


# -- WINDOW MANAGEMENT ----------------------------------------------------

# open new windows/tabs/panes at cur dir
bind c new-window -c '#{pane_current_path}'

# Start window numbering at 1
set -g base-index 1
set -g repeat-time 0

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window


# -- CLIPBOARD -------------------------------------------------

# in copy mode, copying selection also copies to the OS clipboard
#   - true
#   - false (default)
# on macOS, this requires installing reattach-to-user-namespace
# on Linux, this requires xsel or xclip (MIGHT NOT BE TRUE)
tmux_conf_copy_to_os_clipboard=true


# -- OTHER ----------------------------------------------------

# Force reload on "r"
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# all the pretty colours
# set -g default-terminal "xterm-256color"
set-option -g display-time 2000


# -- TMUX PLUGINS ---------------------------------------------

# check to see if tpm is installed, install if not; for setup on new machine
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'   
	#you may need "sudo apt-get install xsel" for this to work
set -g @plugin 'ofirgall/tmux-window-name'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-pain-control'
# set -g @plugin 'tmux-plugins/tmux-battery'
# set -g @plugin 'tmux-plugins/tmux-cpu'

#current theme:
source-file "${HOME}/.tmux/themes/powerline/default/blue.tmuxtheme"

# Plugin configuration 
set -g @sidebar-tree-command 'tree -C | less'
#set -g status-right '#{cpu_fg_color} CPU: #{cpu_icon} #{cpu_percentage} | %a %h-%d %H:%M '


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
