version = 4
final_space = true
console_title_template = '{{ .Shell }} in {{ .Folder }}'

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = true

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '{{ .Path }} '
    foreground = '#77E4F7'
    background = 'plain'
    type = 'path'
    style = 'plain'

    [blocks.segments.options]
      style = 'full'

  [[blocks.segments]]
    type = 'git'
    foreground = '#FFE700'
    style = 'plain'
    template = ' {{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }} <#FFE700>{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}</>'

    [[blocks.segments.option]]
      commit_icon = '@'
      fetch_status = true

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '❯ '
    foreground_templates = [
      "{{if gt .Code 0}}red{{end}}",
      "{{if eq .Code 0}}#43D426{{end}}"
    ]
    type = 'text'
    style = 'plain'

[transient_prompt]
  foreground_templates = [
      "{{if gt .Code 0}}red{{end}}",
      "{{if eq .Code 0}}#43D426{{end}}"
  ]
  background = 'plain'
  template = '❯ '

# right block
[[blocks]]
  type = 'rprompt'

  [[blocks.segments]]
#    template = ' {{ .CurrentDate | date .Format }} '
    foreground = 'yellow'
    type = 'time'
    style = 'plain'
