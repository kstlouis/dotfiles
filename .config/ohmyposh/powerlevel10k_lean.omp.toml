version = 4
final_space = true
console_title_template = '{{ .Shell }} in {{ .Folder }}'

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = true

[[blocks]]
  type = 'rprompt'
  overflow = 'hidden'

  [[blocks.segments]]
    type = 'executiontime'
    foreground = 'yellow'
    style = 'plain'
    template = " <#fefefe></> {{ .FormattedMs }} "

    [blocks.segments.options]
      threshold = 3000
      style = "austin"

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    type = 'path'
    style = 'plain'
    foreground = '#77E4F7'
    background = 'plain'
    template = '{{ .Path }} '

    [blocks.segments.options]
      style = 'full'

  [[blocks.segments]]
    type = 'git'
    foreground = '#FFE700'
    style = 'plain'
    template = ' <magenta>{{ .HEAD }}</><yellow>{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }}</> <#FFE700>{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}</>'
    # template = "{{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }}"

    [blocks.segments.options]
      commit_icon = '@'
      fetch_status = true
      fetch_upstream_icon = true

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '❯ '
    foreground_templates = [
      "{{if gt .Code 0}}red{{end}}",
      "{{if eq .Code 0}}#43D426{{end}}"
    ]
    type = 'text'
    style = 'plain'

[transient_prompt]
  foreground_templates = [
      "{{if gt .Code 0}}red{{end}}",
      "{{if eq .Code 0}}#43D426{{end}}"
  ]
  background = 'plain'
  template = '❯ '

[secondary_prompt]
  foreground = '#43D426'
  background = 'transparent'
  template = '❯❯ '
