# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

# Nord palette
x-colors:
    frost_cyan:     &frost_cyan     "#88C0D0"
    frost_blue:     &frost_blue     "#81A1C1"
    aurora_purple:  &aurora_purple  "#B48EAD"
    aurora_yellow:  &aurora_yellow  "#EBCB8B"
    aurora_green:   &aurora_green   "#A3BE8C"
    aurora_red:     &aurora_red     "#BF616A"

secondary_prompt:
    template: '❯❯ '
    foreground: *aurora_green
    background: transparent

transient_prompt:
    template: '❯ '
    background: plain
    foreground_templates:
        - '{{if gt .Code 0}}#BF616A{{end}}'
        - '{{if eq .Code 0}}#A3BE8C{{end}}'

upgrade:
    source: cdn
    interval: 168h
    auto: false
    notice: true

console_title_template: '{{ .Shell }} in {{ .Folder }}'
blocks:
    - type: prompt
      alignment: left
      segments:
        - template: '{{ if .SSHSession }}󰒋{{ else }}󱩊{{ end }} {{ .UserName }}@{{ .HostName }} '
          type: session
          style: plain
          foreground: *frost_blue
          background: transparent
        - options:
            style: full
          template: '󰝰 {{ .Path }} '
          foreground: *frost_cyan
          background: transparent
          type: path
          style: plain
        - options:
            commit_icon: '@'
            branch_icon: '󰘬 '
            fetch_status: true
            fetch_upstream_icon: true
          template: ' <#B48EAD>{{ .HEAD }}</><#EBCB8B>{{ if or (.Working.Changed) (.Working.Untracked) }} 󰄦{{ end }}{{ if .Staging.Changed }} 󰂚{{ end }}</> <#EBCB8B>{{ if gt .Behind 0 }}󰁅{{ .Behind }}{{ end }}{{ if gt .Ahead 0 }}󰁝{{ .Ahead }}{{ end }}</>'
          foreground: *aurora_yellow
          type: git
          style: plain
      newline: true

    - type: prompt
      alignment: left
      segments:
        - template: '❯ '
          type: text
          style: plain
          foreground_templates:
            - '{{if gt .Code 0}}#BF616A{{end}}'
            - '{{if eq .Code 0}}#A3BE8C{{end}}'
      newline: true

    - type: rprompt
      overflow: hidden
      segments:
        - options:
            style: austin
            threshold: 3000
          template: ' <#D8DEE9></> {{ .FormattedMs }} '
          foreground: *aurora_yellow
          type: executiontime
          style: plain
version: 4
final_space: true
